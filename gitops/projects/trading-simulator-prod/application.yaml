apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: trading-simulator-prod
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  labels:
    app.kubernetes.io/part-of: project-sentinel
    environment: production
spec:
  project: project-sentinel
  source:
    repoURL: https://github.com/gerardsegismundo/Project-Sentinel-Enterprise-DevSecOps-Platform-for-Financial-Services.git
    targetRevision: HEAD
    path: helm/banking-app
    helm:
      valueFiles:
        - values-production.yaml
      parameters:
        - name: image.tag
          value: latest
  destination:
    server: https://kubernetes.default.svc
    namespace: banking
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
      - ApplyOutOfSyncOnly=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 5m
