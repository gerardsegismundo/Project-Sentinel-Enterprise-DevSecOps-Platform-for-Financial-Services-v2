apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: trading-simulator-dev
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/gerardsegismundo/Project-Sentinel.git
    targetRevision: HEAD
    path: helm/banking-app
    helm:
      valueFiles:
        - values-dev.yaml
      parameters:
        - name: image.tag
          value: latest
  destination:
    server: https://kubernetes.default.svc
    namespace: banking
  syncPolicy:
    automated:
      prune: false
      selfHeal: false
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
