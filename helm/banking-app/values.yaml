replicaCount: 3

image:
  repository: 866934333672.dkr.ecr.us-east-1.amazonaws.com/trading-simulator
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets:
  - name: ecr-credentials

serviceAccount:
  create: true
  name: trading-simulator-sa
  annotations: {}
  automountServiceAccountToken: true

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "3000"
  prometheus.io/path: "/metrics"

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1001
  fsGroup: 1001
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 80
  targetPort: 3000

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "500m"
    memory: "256Mi"

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

nodeSelector:
  kubernetes.io/os: linux

tolerations:
  - key: eks.amazonaws.com/compute-type
    operator: Equal
    value: fargate
    effect: NoSchedule

tracing:
  enabled: true
  collectorEndpoint: "http://jaeger-collector.tracing.svc.cluster.local:4318"

ingress:
  enabled: false
  className: nginx
  annotations: {}
  hosts:
    - host: trading-simulator.local
      paths:
        - path: /
          pathType: Prefix
  tls: []
