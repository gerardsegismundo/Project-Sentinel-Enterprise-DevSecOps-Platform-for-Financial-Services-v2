apiVersion: v1
kind: Namespace
metadata:
  name: external-secrets
  labels:
    name: external-secrets
---
# ClusterSecretStore — connects to AWS Secrets Manager
# Requires ESO to be installed via Helm (see ansible/roles/secrets-manager/)
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
---
# ExternalSecret — syncs banking app secrets from AWS Secrets Manager
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: banking-app-secrets
  namespace: banking
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: banking-app-secrets
    creationPolicy: Owner
  data:
    - secretKey: JWT_SECRET
      remoteRef:
        key: /project-sentinel/dev/app
        property: JWT_SECRET
    - secretKey: SESSION_SECRET
      remoteRef:
        key: /project-sentinel/dev/app
        property: SESSION_SECRET
    - secretKey: ENCRYPTION_KEY
      remoteRef:
        key: /project-sentinel/dev/app
        property: ENCRYPTION_KEY
---
# ExternalSecret — syncs Grafana admin credentials
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: grafana-secrets
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: grafana-admin
    creationPolicy: Owner
  data:
    - secretKey: password
      remoteRef:
        key: /project-sentinel/dev/grafana
        property: GRAFANA_ADMIN_PASSWORD
---
# ExternalSecret — syncs database credentials
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: database-secrets
  namespace: banking
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: database-credentials
    creationPolicy: Owner
  data:
    - secretKey: DB_HOST
      remoteRef:
        key: /project-sentinel/dev/database
        property: DB_HOST
    - secretKey: DB_PORT
      remoteRef:
        key: /project-sentinel/dev/database
        property: DB_PORT
    - secretKey: DB_NAME
      remoteRef:
        key: /project-sentinel/dev/database
        property: DB_NAME
    - secretKey: DB_USER
      remoteRef:
        key: /project-sentinel/dev/database
        property: DB_USER
    - secretKey: DB_PASSWORD
      remoteRef:
        key: /project-sentinel/dev/database
        property: DB_PASSWORD
