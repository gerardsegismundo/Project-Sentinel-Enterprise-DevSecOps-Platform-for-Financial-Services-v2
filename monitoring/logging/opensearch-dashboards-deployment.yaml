apiVersion: apps/v1
kind: Deployment
metadata:
  name: opensearch-dashboards
  namespace: logging
  labels:
    app: opensearch-dashboards
spec:
  replicas: 1
  selector:
    matchLabels:
      app: opensearch-dashboards
  template:
    metadata:
      labels:
        app: opensearch-dashboards
    spec:
      containers:
      - name: opensearch-dashboards
        securityContext:
          allowPrivilegeEscalation: false
        image: opensearchproject/opensearch-dashboards:2.14.0
        ports:
        - containerPort: 5601
          name: http
          protocol: TCP
        env:
        - name: OPENSEARCH_HOSTS
          value: '["http://opensearch.logging.svc.cluster.local:9200"]'
        - name: DISABLE_SECURITY_DASHBOARDS_PLUGIN
          value: "true"
        - name: SERVER_BASEPATH
          value: "/dashboards"
        - name: SERVER_REWRITEBASEPATH
          value: "true"
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /dashboards/api/status
            port: 5601
          initialDelaySeconds: 60
          periodSeconds: 15
          timeoutSeconds: 10
        readinessProbe:
          httpGet:
            path: /dashboards/api/status
            port: 5601
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: opensearch-dashboards
  namespace: logging
  labels:
    app: opensearch-dashboards
spec:
  selector:
    app: opensearch-dashboards
  type: ClusterIP
  ports:
  - port: 5601
    targetPort: 5601
    name: http
    protocol: TCP
