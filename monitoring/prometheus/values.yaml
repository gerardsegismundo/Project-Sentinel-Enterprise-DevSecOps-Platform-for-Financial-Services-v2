server:
  enabled: true
  name: server
  port: 9090
  targetPort: 9090

  service:
    type: ClusterIP
    port: 80
    targetPort: 9090

  serviceAccount:
    create: true
    name: prometheus-server
    annotations:
      eks.amazonaws.com/role-arn: arn:aws:iam::123456789012:role/prometheus-server

  podAnnotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "9090"
    prometheus.io/path: "/metrics"

  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    fsGroup: 1000

  retention: 15d
  retention-size: "50GB"
  storageSpec:
    volumeClaimTemplate:
      spec:
        storageClassName: gp3
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 20Gi

  resources:
    requests:
      cpu: "200m"
      memory: "512Mi"
    limits:
      cpu: "1000m"
      memory: "2Gi"

  extraScrapeConfigs:
    - job_name: 'trading-simulator'
      kubernetes_sd_configs:
        - role: pod
      relabel_configs:
        - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
          action: keep
          regex: 'true'
        - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
          action: replace
          target_label: __metrics_path__
          regex: (.+)
        - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
          action: replace
          regex: '([^:]+)(?::\d+)?;(\d+)'
          replacement: '${1}:${2}'
          target_label: __address__
        - action: labelmap
          regex: __meta_kubernetes_pod_label_(.+)
        - source_labels: [__meta_kubernetes_namespace]
          action: replace
          target_label: kubernetes_namespace
        - source_labels: [__meta_kubernetes_pod_name]
          action: replace
          target_label: kubernetes_pod_name

  extraRules:
    custom:
      - name: HighErrorRate
        expr: |
          sum(rate(http_requests_total{namespace="banking",status=~"5.."}[5m])) 
          / 
          sum(rate(http_requests_total{namespace="banking"}[5m])) * 100 > 5
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High error rate detected"
          description: "Error rate is {{ $value }}%"
      - name: HighLatency
        expr: |
          histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{namespace="banking"}[5m])) by (le)) * 1000 > 500
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High latency detected"
          description: "P95 latency is {{ $value }}ms"

alertmanager:
  enabled: true
  name: alertmanager
  replicas: 1

  service:
    type: ClusterIP
    port: 80
    targetPort: 9093

  serviceAccount:
    create: true
    name: alertmanager
    annotations:
      eks.amazonaws.com/role-arn: arn:aws:iam::123456789012:role/alertmanager

  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    fsGroup: 1000

  config:
    global:
      resolve_timeout: 5m
      slack_api_url: "${SLACK_WEBHOOK_URL}"
      pagerduty_url: "${PAGERDUTY_URL}"

    route:
      receiver: 'default'
      group_by: ['alertname', 'cluster', 'service']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      routes:
        - match:
            severity: critical
          receiver: 'critical-alerts'
          continue: true
        - match:
            severity: warning
          receiver: 'warning-alerts'

    receivers:
      - name: 'default'
        slack_configs:
          - channel: '#alerts'
            send_resolved: true
            title: '{{ .CommonAnnotations.summary }}'
            text: '{{ .CommonAnnotations.description }}'
        pagerduty_configs:
          - service_key: "${PAGERDUTY_SERVICE_KEY}"
            severity: critical
            description: '{{ .CommonAnnotations.summary }}'
      - name: 'critical-alerts'
        slack_configs:
          - channel: '#critical-alerts'
            send_resolved: true
        pagerduty_configs:
          - service_key: "${PAGERDUTY_SERVICE_KEY}"
            severity: critical
      - name: 'warning-alerts'
        slack_configs:
          - channel: '#warnings'
            send_resolved: true

    inhibit_rules:
      - source_match:
          severity: 'critical'
        target_match:
          severity: 'warning'
        equal: ['alertname', 'namespace']

  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "200m"
      memory: "256Mi"

kubeStateMetrics:
  enabled: true

nodeExporter:
  enabled: true
