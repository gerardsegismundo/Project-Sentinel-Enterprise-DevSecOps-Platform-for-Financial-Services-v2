name: CI/CD Pipeline

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: trading-simulator
  IMAGE_TAG: ${{ github.sha }}
  HELM_CHART_PATH: helm/banking-app
  CLUSTER_DEV: project-sentinel-dev
  CLUSTER_STAGING: project-sentinel-staging
  CLUSTER_PROD: project-sentinel-prod
  LOCAL_IMAGE: trading-simulator:${{ github.sha }}

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            ./app/package-lock.json
            ./app/client/package-lock.json
      - name: Install and lint server
        working-directory: ./app
        run: |
          npm ci
          npm run lint
      - name: Test server
        working-directory: ./app
        run: npm test -- --coverage
      - name: Install and build client
        working-directory: ./app/client
        run: |
          npm ci
          npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: app/coverage/

  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: trufflesecurity/truffleHog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified

  sast:
    name: SAST Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: SonarSource/sonarqube-scan-action@v2
        if: ${{ env.SONAR_TOKEN != '' && env.SONAR_HOST_URL != '' }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  sast-semgrep:
    name: SAST Scan (Semgrep)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/security-audit
            p/secrets
            p/owasp-top-ten

  dependency-scan:
    name: Dependency Scan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./app/package-lock.json
      - run: npm ci
      - name: Snyk dependency scan
        if: ${{ env.SNYK_TOKEN != '' }}
        run: npx snyk test --severity-threshold=high
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      - name: npm audit fallback
        if: ${{ env.SNYK_TOKEN == '' }}
        run: npm audit --audit-level=high || true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

  iac-scan:
    name: IaC Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - run: terraform fmt -check -recursive terraform/
      - run: terraform -chdir=terraform/environments/dev/ init -backend=false
      - run: terraform -chdir=terraform/environments/dev/ validate
      - run: terraform -chdir=terraform/environments/staging/ init -backend=false
      - run: terraform -chdir=terraform/environments/staging/ validate
      - run: terraform -chdir=terraform/environments/production/ init -backend=false
      - run: terraform -chdir=terraform/environments/production/ validate
      - uses: bridgecrewio/checkov-action@v12
        with:
          directory: terraform/
          framework: terraform
          soft_fail: false
      - uses: aquasecurity/tfsec-action@v1.0.0
        with:
          working_directory: terraform/
          soft_fail: true

  build-push:
    name: Build & Push
    needs: [lint-and-test, secret-scan, sast, sast-semgrep, dependency-scan, iac-scan]
    runs-on: ubuntu-latest
    outputs:
      image-ref: ${{ steps.set-image.outputs.image-ref }}
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t ${{ env.LOCAL_IMAGE }} ./app
      - name: Set image reference
        id: set-image
        run: echo "image-ref=${{ env.LOCAL_IMAGE }}" >> $GITHUB_OUTPUT
      - name: Save image for downstream jobs
        run: |
          docker save ${{ env.LOCAL_IMAGE }} -o /tmp/image.tar
      - uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: /tmp/image.tar
          retention-days: 1
      - name: Push to ECR
        if: ${{ env.HAS_AWS_CREDS == 'true' }}
        env:
          HAS_AWS_CREDS: ${{ secrets.AWS_ACCESS_KEY_ID != '' && secrets.AWS_SECRET_ACCESS_KEY != '' }}
        run: |
          echo "::notice::Pushing image to ECR..."
      - uses: aws-actions/configure-aws-credentials@v4
        if: ${{ env.HAS_AWS_CREDS == 'true' }}
        env:
          HAS_AWS_CREDS: ${{ secrets.AWS_ACCESS_KEY_ID != '' && secrets.AWS_SECRET_ACCESS_KEY != '' }}
        with:
          aws-region: ${{ env.AWS_REGION }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      - id: login-ecr
        if: ${{ env.HAS_AWS_CREDS == 'true' }}
        uses: aws-actions/amazon-ecr-login@v2
        env:
          HAS_AWS_CREDS: ${{ secrets.AWS_ACCESS_KEY_ID != '' && secrets.AWS_SECRET_ACCESS_KEY != '' }}
      - name: Tag and push to ECR
        if: steps.login-ecr.outcome == 'success'
        run: |
          docker tag ${{ env.LOCAL_IMAGE }} ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
          docker tag ${{ env.LOCAL_IMAGE }} ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:dev
          docker push ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
          docker push ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:dev
      - name: ECR push skipped
        if: steps.login-ecr.outcome == 'skipped'
        run: echo "::warning::AWS credentials not configured — ECR push skipped. Set AWS_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY in GitHub Secrets to enable."

  container-scan:
    name: Container Scan (Grype & Trivy)
    needs: build-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: /tmp
      - name: Load Docker image
        run: docker load -i /tmp/image.tar
      - name: Install Grype
        run: curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin
      - name: Scan image with Grype
        run: grype ${{ env.LOCAL_IMAGE }} --fail-on critical -o json > grype-report.json || true
      - uses: actions/upload-artifact@v4
        with:
          name: grype-report
          path: grype-report.json
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          input: /tmp/image.tar
          format: 'table'
          severity: 'CRITICAL,HIGH'
      - name: Trivy SARIF report
        uses: aquasecurity/trivy-action@master
        with:
          input: /tmp/image.tar
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        continue-on-error: true
        with:
          sarif_file: 'trivy-results.sarif'

  terraform-apply:
    name: Terraform Apply Dev
    needs: iac-scan
    runs-on: ubuntu-latest
    environment: dev
    outputs:
      role-arn: ${{ steps.get-role.outputs.role-arn }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - name: Terraform init and plan (dry run)
        if: ${{ env.HAS_AWS_CREDS != 'true' }}
        env:
          HAS_AWS_CREDS: ${{ secrets.AWS_ACCESS_KEY_ID != '' && secrets.AWS_SECRET_ACCESS_KEY != '' }}
        run: |
          echo "::warning::AWS credentials not configured — running Terraform in dry-run mode"
          terraform -chdir=terraform/environments/dev/ init -backend=false
          terraform -chdir=terraform/environments/dev/ validate
          echo "Terraform validation passed (dry run)"
      - uses: aws-actions/configure-aws-credentials@v4
        if: ${{ env.HAS_AWS_CREDS == 'true' }}
        env:
          HAS_AWS_CREDS: ${{ secrets.AWS_ACCESS_KEY_ID != '' && secrets.AWS_SECRET_ACCESS_KEY != '' }}
        with:
          aws-region: ${{ env.AWS_REGION }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      - name: Terraform init
        if: ${{ env.HAS_AWS_CREDS == 'true' }}
        env:
          HAS_AWS_CREDS: ${{ secrets.AWS_ACCESS_KEY_ID != '' && secrets.AWS_SECRET_ACCESS_KEY != '' }}
        run: terraform -chdir=terraform/environments/dev/ init
      - name: Terraform plan
        if: ${{ env.HAS_AWS_CREDS == 'true' }}
        env:
          HAS_AWS_CREDS: ${{ secrets.AWS_ACCESS_KEY_ID != '' && secrets.AWS_SECRET_ACCESS_KEY != '' }}
        run: terraform -chdir=terraform/environments/dev/ plan -out=tfplan
      - name: Terraform apply
        if: ${{ env.HAS_AWS_CREDS == 'true' }}
        env:
          HAS_AWS_CREDS: ${{ secrets.AWS_ACCESS_KEY_ID != '' && secrets.AWS_SECRET_ACCESS_KEY != '' }}
        run: terraform -chdir=terraform/environments/dev/ apply -auto-approve tfplan
      - name: Export Terraform outputs
        if: ${{ env.HAS_AWS_CREDS == 'true' }}
        env:
          HAS_AWS_CREDS: ${{ secrets.AWS_ACCESS_KEY_ID != '' && secrets.AWS_SECRET_ACCESS_KEY != '' }}
        run: terraform -chdir=terraform/environments/dev/ output -json > terraform-outputs.json
      - id: get-role
        if: ${{ env.HAS_AWS_CREDS == 'true' }}
        env:
          HAS_AWS_CREDS: ${{ secrets.AWS_ACCESS_KEY_ID != '' && secrets.AWS_SECRET_ACCESS_KEY != '' }}
        run: echo "role-arn=$(terraform -chdir=terraform/environments/dev output -raw github_actions_role_arn)" >> $GITHUB_OUTPUT
      - uses: actions/upload-artifact@v4
        if: ${{ env.HAS_AWS_CREDS == 'true' }}
        env:
          HAS_AWS_CREDS: ${{ secrets.AWS_ACCESS_KEY_ID != '' && secrets.AWS_SECRET_ACCESS_KEY != '' }}
        with:
          name: terraform-outputs
          path: terraform-outputs.json

  deploy-dev:
    name: Deploy Dev
    needs: [container-scan, terraform-apply]
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to EKS (dev)
        if: ${{ env.HAS_AWS_CREDS == 'true' }}
        env:
          HAS_AWS_CREDS: ${{ secrets.AWS_ACCESS_KEY_ID != '' && secrets.AWS_SECRET_ACCESS_KEY != '' }}
        uses: ./.github/actions/helm-deploy
        with:
          aws-region: ${{ env.AWS_REGION }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          cluster-name: ${{ env.CLUSTER_DEV }}
          chart-path: ${{ env.HELM_CHART_PATH }}
          values-file: ${{ env.HELM_CHART_PATH }}/values-dev.yaml
          image-tag: ${{ env.IMAGE_TAG }}
      - name: Deploy skipped
        if: ${{ env.HAS_AWS_CREDS != 'true' }}
        env:
          HAS_AWS_CREDS: ${{ secrets.AWS_ACCESS_KEY_ID != '' && secrets.AWS_SECRET_ACCESS_KEY != '' }}
        run: echo "::warning::AWS credentials not configured — EKS deployment skipped. Configure AWS_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY to enable deployments."

  deploy-staging:
    name: Deploy Staging
    needs: container-scan
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to EKS (staging)
        if: ${{ env.HAS_AWS_CREDS == 'true' }}
        env:
          HAS_AWS_CREDS: ${{ secrets.AWS_ACCESS_KEY_ID != '' && secrets.AWS_SECRET_ACCESS_KEY != '' }}
        uses: ./.github/actions/helm-deploy
        with:
          aws-region: ${{ env.AWS_REGION }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          cluster-name: ${{ env.CLUSTER_STAGING }}
          chart-path: ${{ env.HELM_CHART_PATH }}
          values-file: ${{ env.HELM_CHART_PATH }}/values-staging.yaml
          image-tag: ${{ env.IMAGE_TAG }}
      - name: Deploy skipped
        if: ${{ env.HAS_AWS_CREDS != 'true' }}
        env:
          HAS_AWS_CREDS: ${{ secrets.AWS_ACCESS_KEY_ID != '' && secrets.AWS_SECRET_ACCESS_KEY != '' }}
        run: echo "::warning::AWS credentials not configured — EKS deployment skipped. Configure AWS_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY to enable deployments."

  integration-test:
    name: Integration Tests
    needs: [deploy-dev, deploy-staging]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./app/package-lock.json
      - run: npm ci
      - name: Run integration tests
        run: |
          if npm run test:integration 2>&1; then
            echo "Integration tests passed"
          else
            EXIT_CODE=$?
            if [ $EXIT_CODE -eq 1 ] && npm run test:integration --list 2>&1 | grep -q 'No tests found'; then
              echo "::warning::No integration tests defined — skipping"
            else
              echo "::error::Integration tests failed with exit code $EXIT_CODE"
              exit $EXIT_CODE
            fi
          fi
      - name: Run unit tests as fallback
        if: failure()
        run: npm test

  dast-scan:
    name: DAST Scan (OWASP ZAP)
    needs: [deploy-dev]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan deployed app
        if: ${{ env.HAS_AWS_CREDS == 'true' }}
        env:
          HAS_AWS_CREDS: ${{ secrets.AWS_ACCESS_KEY_ID != '' && secrets.AWS_SECRET_ACCESS_KEY != '' }}
        uses: ./.github/actions/aws-eks-setup
        with:
          aws-region: ${{ env.AWS_REGION }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          cluster-name: ${{ env.CLUSTER_DEV }}
          install-kubectl: 'false'
      - name: Get service endpoint
        if: ${{ env.HAS_AWS_CREDS == 'true' }}
        id: service
        env:
          HAS_AWS_CREDS: ${{ secrets.AWS_ACCESS_KEY_ID != '' && secrets.AWS_SECRET_ACCESS_KEY != '' }}
        run: |
          SERVICE_IP=$(kubectl get svc trading-simulator -n banking -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
          if [ -z "$SERVICE_IP" ]; then
            echo "::error::Could not resolve service endpoint for trading-simulator"
            exit 1
          fi
          echo "endpoint=http://$SERVICE_IP" >> $GITHUB_OUTPUT
      - name: Run OWASP ZAP Scan (deployed)
        if: steps.service.outcome == 'success'
        uses: zaproxy/action-full-scan@v0.12.0
        continue-on-error: true
        with:
          target: ${{ steps.service.outputs.endpoint }}
          rules_file_name: '.zap/rules.tsv'
          cmd_options: '-a'
          allow_issue_writing: false
      - name: DAST scan (local)
        if: ${{ env.HAS_AWS_CREDS != 'true' }}
        env:
          HAS_AWS_CREDS: ${{ secrets.AWS_ACCESS_KEY_ID != '' && secrets.AWS_SECRET_ACCESS_KEY != '' }}
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Start local app and run ZAP
        if: ${{ env.HAS_AWS_CREDS != 'true' }}
        env:
          HAS_AWS_CREDS: ${{ secrets.AWS_ACCESS_KEY_ID != '' && secrets.AWS_SECRET_ACCESS_KEY != '' }}
        run: |
          cd app && npm ci
          node src/index.js &
          sleep 3
          echo "::notice::Running DAST scan against local app on http://localhost:3000"
      - name: Run OWASP ZAP Scan (local)
        if: ${{ env.HAS_AWS_CREDS != 'true' }}
        env:
          HAS_AWS_CREDS: ${{ secrets.AWS_ACCESS_KEY_ID != '' && secrets.AWS_SECRET_ACCESS_KEY != '' }}
        uses: zaproxy/action-full-scan@v0.12.0
        continue-on-error: true
        with:
          target: 'http://localhost:3000'
          cmd_options: '-a'
          allow_issue_writing: false
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-report
          path: report_html.html

  performance-test:
    name: Performance Test (k6)
    needs: [deploy-dev]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./app/package-lock.json
      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6 -y
      - name: Start local app
        working-directory: ./app
        run: |
          npm ci
          node src/index.js &
          sleep 3
      - name: Run k6 load test
        run: k6 run --out json=k6-results.json app/tests/performance/load-test.js
        env:
          TARGET_URL: 'http://localhost:3000'
        continue-on-error: true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: k6-performance-report
          path: |
            k6-results.json
            performance-report.json

  synthetic-monitoring:
    name: Synthetic Monitoring
    needs: [deploy-dev]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./app/package-lock.json
      - name: Start local app
        working-directory: ./app
        run: |
          npm ci
          node src/index.js &
          sleep 3
      - name: Run synthetic health checks
        run: node app/tests/synthetic/health-check.js
        env:
          TARGET_URL: 'http://localhost:3000'
          SLO_LATENCY_MS: '500'
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: synthetic-monitoring-report
          path: synthetic-report.json

  deploy-production:
    name: Deploy Production
    needs: [container-scan, integration-test, dast-scan, performance-test, synthetic-monitoring]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/develop')
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        if: ${{ env.HAS_AWS_CREDS == 'true' }}
        env:
          HAS_AWS_CREDS: ${{ secrets.AWS_ACCESS_KEY_ID != '' && secrets.AWS_SECRET_ACCESS_KEY != '' }}
        with:
          aws-region: ${{ env.AWS_REGION }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      - name: Check prod cluster exists
        if: ${{ env.HAS_AWS_CREDS == 'true' }}
        id: cluster-check
        env:
          HAS_AWS_CREDS: ${{ secrets.AWS_ACCESS_KEY_ID != '' && secrets.AWS_SECRET_ACCESS_KEY != '' }}
        run: |
          if aws eks describe-cluster --name "$CLUSTER_PROD" --region "$AWS_REGION" > /dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "::warning::Production cluster $CLUSTER_PROD not found — deployment skipped."
          fi
      - name: Deploy to EKS (production)
        if: ${{ env.HAS_AWS_CREDS == 'true' && steps.cluster-check.outputs.exists == 'true' }}
        uses: ./.github/actions/helm-deploy
        with:
          aws-region: ${{ env.AWS_REGION }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          cluster-name: ${{ env.CLUSTER_PROD }}
          chart-path: ${{ env.HELM_CHART_PATH }}
          values-file: ${{ env.HELM_CHART_PATH }}/values.yaml
          image-tag: ${{ env.IMAGE_TAG }}
      - name: Verify rollout
        if: ${{ env.HAS_AWS_CREDS == 'true' && steps.cluster-check.outputs.exists == 'true' }}
        run: kubectl rollout status deployment/trading-simulator -n banking --timeout=5m
      - name: Deploy skipped
        if: ${{ env.HAS_AWS_CREDS != 'true' }}
        env:
          HAS_AWS_CREDS: ${{ secrets.AWS_ACCESS_KEY_ID != '' && secrets.AWS_SECRET_ACCESS_KEY != '' }}
        run: echo "::warning::AWS credentials not configured — production deployment skipped."

  validate-deployment:
    name: Validate Deployment
    needs: deploy-production
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: ./app
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        if: ${{ env.HAS_AWS_CREDS == 'true' }}
        env:
          HAS_AWS_CREDS: ${{ secrets.AWS_ACCESS_KEY_ID != '' && secrets.AWS_SECRET_ACCESS_KEY != '' }}
        with:
          aws-region: ${{ env.AWS_REGION }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      - name: Check prod cluster exists
        if: ${{ env.HAS_AWS_CREDS == 'true' }}
        id: cluster-check
        env:
          HAS_AWS_CREDS: ${{ secrets.AWS_ACCESS_KEY_ID != '' && secrets.AWS_SECRET_ACCESS_KEY != '' }}
        run: |
          if aws eks describe-cluster --name "$CLUSTER_PROD" --region "$AWS_REGION" > /dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "::warning::Production cluster $CLUSTER_PROD not found — validation skipped."
          fi
      - name: Validate on EKS
        if: ${{ env.HAS_AWS_CREDS == 'true' && steps.cluster-check.outputs.exists == 'true' }}
        uses: ./.github/actions/aws-eks-setup
        with:
          aws-region: ${{ env.AWS_REGION }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          cluster-name: ${{ env.CLUSTER_PROD }}
      - name: Verify pod health
        if: ${{ env.HAS_AWS_CREDS == 'true' && steps.cluster-check.outputs.exists == 'true' }}
        run: |
          READY=$(kubectl get deployment trading-simulator -n banking -o jsonpath='{.status.readyReplicas}')
          DESIRED=$(kubectl get deployment trading-simulator -n banking -o jsonpath='{.spec.replicas}')
          if [ "$READY" != "$DESIRED" ]; then
            echo "Deployment validation failed: $READY/$DESIRED pods ready"
            exit 1
          fi
          echo "Deployment validation passed: $READY/$DESIRED pods ready"
      - name: Check application health
        if: ${{ env.HAS_AWS_CREDS == 'true' && steps.cluster-check.outputs.exists == 'true' }}
        run: |
          POD=$(kubectl get pods -n banking -l app=trading-simulator -o jsonpath='{.items[0].metadata.name}')
          kubectl exec -n banking "$POD" -- wget -q -O- http://localhost:3000/health || echo "Health check completed"
      - name: Local health check
        if: ${{ env.HAS_AWS_CREDS != 'true' }}
        env:
          HAS_AWS_CREDS: ${{ secrets.AWS_ACCESS_KEY_ID != '' && secrets.AWS_SECRET_ACCESS_KEY != '' }}
        run: |
          npm ci
          node -e "
            const app = require('./src/index');
            const http = require('http');
            const server = app.listen(0, () => {
              const port = server.address().port;
              http.get('http://localhost:' + port + '/health', (res) => {
                let data = '';
                res.on('data', chunk => data += chunk);
                res.on('end', () => {
                  console.log('Health check response:', data);
                  const parsed = JSON.parse(data);
                  if (parsed.status === 'healthy') {
                    console.log('Application health check passed');
                    server.close(() => process.exit(0));
                  } else {
                    console.error('Health check failed');
                    server.close(() => process.exit(1));
                  }
                });
              });
            });
          "

  rollback:
    name: Rollback Production
    needs: validate-deployment
    if: failure()
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        if: ${{ env.HAS_AWS_CREDS == 'true' }}
        env:
          HAS_AWS_CREDS: ${{ secrets.AWS_ACCESS_KEY_ID != '' && secrets.AWS_SECRET_ACCESS_KEY != '' }}
        with:
          aws-region: ${{ env.AWS_REGION }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      - name: Check prod cluster exists
        if: ${{ env.HAS_AWS_CREDS == 'true' }}
        id: cluster-check
        env:
          HAS_AWS_CREDS: ${{ secrets.AWS_ACCESS_KEY_ID != '' && secrets.AWS_SECRET_ACCESS_KEY != '' }}
        run: |
          if aws eks describe-cluster --name "$CLUSTER_PROD" --region "$AWS_REGION" > /dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "::warning::Production cluster $CLUSTER_PROD not found — rollback skipped."
          fi
      - name: Rollback on EKS
        if: ${{ env.HAS_AWS_CREDS == 'true' && steps.cluster-check.outputs.exists == 'true' }}
        uses: ./.github/actions/aws-eks-setup
        with:
          aws-region: ${{ env.AWS_REGION }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          cluster-name: ${{ env.CLUSTER_PROD }}
      - name: Helm rollback
        if: ${{ env.HAS_AWS_CREDS == 'true' && steps.cluster-check.outputs.exists == 'true' }}
        run: helm rollback trading-simulator -n banking
      - name: Verify rollback
        if: ${{ env.HAS_AWS_CREDS == 'true' && steps.cluster-check.outputs.exists == 'true' }}
        run: kubectl rollout status deployment/trading-simulator -n banking --timeout=5m
      - name: Rollback skipped
        if: ${{ env.HAS_AWS_CREDS != 'true' }}
        env:
          HAS_AWS_CREDS: ${{ secrets.AWS_ACCESS_KEY_ID != '' && secrets.AWS_SECRET_ACCESS_KEY != '' }}
        run: echo "::warning::AWS credentials not configured — rollback skipped."
