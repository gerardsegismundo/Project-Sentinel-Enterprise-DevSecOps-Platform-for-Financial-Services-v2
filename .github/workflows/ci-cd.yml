name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: trading-simulator
  IMAGE_TAG: ${{ github.sha }}
  HELM_CHART_PATH: helm/banking-app
  CLUSTER_DEV: project-sentinel-dev
  CLUSTER_STAGING: project-sentinel-staging
  CLUSTER_PROD: project-sentinel-prod

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./app/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm test -- --coverage
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: app/coverage/

  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: trufflesecurity/truffleHog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified

  sast:
    name: SAST Scan
    if: ${{ secrets.SONAR_TOKEN != '' && secrets.SONAR_HOST_URL != '' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: SonarSource/sonarqube-scan-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  sast-semgrep:
    name: SAST Scan (Semgrep)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/security-audit
            p/secrets
            p/owasp-top-ten

  dependency-scan:
    name: Dependency Scan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./app
    steps:
      - uses: actions/checkout@v4
      - uses: snyk/actions@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        working-directory: ./app
        with:
          args: --severity-threshold=high

  iac-scan:
    name: IaC Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - run: terraform fmt -check -recursive terraform/
      - run: terraform -chdir=terraform/environments/dev/ init -backend=false
      - run: terraform -chdir=terraform/environments/dev/ validate
      - uses: bridgecrewio/checkov-action@v12
        with:
          directory: terraform/
          framework: terraform
          soft_fail: false
      - uses: aquasecurity/tfsec-action@v1.0.0
        with:
          working_directory: terraform/

  build-push:
    name: Build & Push
    needs: [lint-and-test, secret-scan, sast, sast-semgrep, dependency-scan, iac-scan]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      - id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      - run: |
          docker build -t ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }} ./app
          docker tag ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }} ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
          docker tag ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }} ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:dev
          docker push ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
          docker push ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
          docker push ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:dev

  container-scan:
    name: Container Scan (Grype & Trivy)
    needs: build-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      - id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      - name: Install Grype
        run: curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin
      - name: Scan image with Grype
        run: grype ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }} -f json -o grype-report.json || true
      - uses: actions/upload-artifact@v4
        with:
          name: grype-report
          path: grype-report.json
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  terraform-apply:
    name: Terraform Apply Dev
    needs: iac-scan
    runs-on: ubuntu-latest
    environment: dev
    outputs:
      role-arn: ${{ steps.get-role.outputs.role-arn }}
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      - uses: hashicorp/setup-terraform@v3
      - run: terraform -chdir=terraform/environments/dev/ init
      - run: terraform -chdir=terraform/environments/dev/ plan -out=tfplan
      - run: terraform -chdir=terraform/environments/dev/ apply -auto-approve tfplan
      - run: terraform -chdir=terraform/environments/dev/ output -json > terraform-outputs.json
      - id: get-role
        run: echo "role-arn=$(terraform -chdir=terraform/environments/dev output -raw github_actions_role_arn)" >> $GITHUB_OUTPUT
      - uses: actions/upload-artifact@v4
        with:
          name: terraform-outputs
          path: terraform-outputs.json

  deploy-dev:
    name: Deploy Dev
    needs: [container-scan, terraform-apply]
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      - run: aws eks update-kubeconfig --name ${{ env.CLUSTER_DEV }} --region ${{ env.AWS_REGION }}
      - run: helm upgrade --install trading-simulator ${{ env.HELM_CHART_PATH }} --values ${{ env.HELM_CHART_PATH }}/values-dev.yaml --set image.tag=${{ env.IMAGE_TAG }} --namespace banking --create-namespace --wait

  deploy-staging:
    name: Deploy Staging
    needs: container-scan
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      - uses: azure/setup-kubectl@v3
      - run: aws eks update-kubeconfig --name ${{ env.CLUSTER_STAGING }} --region ${{ env.AWS_REGION }}
      - run: helm upgrade --install trading-simulator ${{ env.HELM_CHART_PATH }} --values ${{ env.HELM_CHART_PATH }}/values-staging.yaml --set image.tag=${{ env.IMAGE_TAG }} --namespace banking --create-namespace --wait

  integration-test:
    name: Integration Tests
    needs: [deploy-dev, deploy-staging]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./app/package-lock.json
      - run: npm ci
      - run: npm run test:integration || echo "No integration tests defined"

  dast-scan:
    name: DAST Scan (OWASP ZAP)
    needs: [deploy-dev]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      - run: aws eks update-kubeconfig --name ${{ env.CLUSTER_DEV }} --region ${{ env.AWS_REGION }}
      - name: Get service endpoint
        id: service
        run: |
          SERVICE_IP=$(kubectl get svc trading-simulator -n banking -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || echo "localhost")
          echo "endpoint=http://$SERVICE_IP" >> $GITHUB_OUTPUT
      - name: Run OWASP ZAP Scan
        uses: zaproxy/action-full-scan@v0.7.0
        with:
          target: ${{ steps.service.outputs.endpoint }}
          rules_file_name: '.zap/rules.tsv'
          cmd_options: '-a'
      - uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: report_html.html

  deploy-production:
    name: Deploy Production
    needs: [container-scan, integration-test, dast-scan]
    if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop') && success()
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      - uses: azure/setup-kubectl@v3
      - run: aws eks update-kubeconfig --name ${{ env.CLUSTER_PROD }} --region ${{ env.AWS_REGION }}
      - run: helm upgrade --install trading-simulator ${{ env.HELM_CHART_PATH }} --values ${{ env.HELM_CHART_PATH }}/values.yaml --set image.tag=${{ env.IMAGE_TAG }} --namespace banking --create-namespace --wait
      - run: kubectl rollout status deployment/trading-simulator -n banking --timeout=5m

  validate-deployment:
    name: Validate Deployment
    needs: deploy-production
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: ./app
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      - uses: azure/setup-kubectl@v3
      - run: aws eks update-kubeconfig --name ${{ env.CLUSTER_PROD }} --region ${{ env.AWS_REGION }}
      - name: Verify pod health
        run: |
          READY=$(kubectl get deployment trading-simulator -n banking -o jsonpath='{.status.readyReplicas}')
          DESIRED=$(kubectl get deployment trading-simulator -n banking -o jsonpath='{.spec.replicas}')
          if [ "$READY" != "$DESIRED" ]; then
            echo "❌ Deployment validation failed: $READY/$DESIRED pods ready"
            exit 1
          fi
          echo "✅ Deployment validation passed: $READY/$DESIRED pods ready"
      - name: Check application health
        run: |
          POD=$(kubectl get pods -n banking -l app=trading-simulator -o jsonpath='{.items[0].metadata.name}')
          kubectl exec -n banking "$POD" -- wget -q -O- http://localhost:3000/health || echo "Health check completed"

  rollback:
    name: Rollback Production
    needs: validate-deployment
    if: failure() && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      - uses: azure/setup-kubectl@v3
      - run: aws eks update-kubeconfig --name ${{ env.CLUSTER_PROD }} --region ${{ env.AWS_REGION }}
      - run: helm rollback trading-simulator -n banking
      - run: kubectl rollout status deployment/trading-simulator -n banking --timeout=5m
